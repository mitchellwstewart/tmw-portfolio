<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Bundled Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f7f9fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    @media (max-width: 768px) {
      body { align-items: flex-start !important; }
      /* Intro */
      [data-screen-label="Intro"] {
        grid-template-columns: 1fr !important;
        padding: 32px 20px 16px !important;
        gap: 16px !important;
      }
      [data-screen-label="Intro"] > div:last-child { align-items: flex-start !important; }
      [data-screen-label="Intro"] h1 { font-size: 22px !important; }
      [data-screen-label="Intro"] + div { margin: 20px 20px !important; }
      /* Project rows: stack sidebar above images */
      [data-screen-label]:not([data-screen-label="Intro"]):not([data-screen-label="Footer"]) {
        grid-template-columns: 1fr !important;
        padding: 8px 20px 40px !important;
        gap: 20px !important;
      }
      [data-screen-label]:not([data-screen-label="Intro"]):not([data-screen-label="Footer"]) > div:first-child {
        position: relative !important;
        top: auto !important;
      }
      /* Main image height */
      [data-screen-label]:not([data-screen-label="Intro"]):not([data-screen-label="Footer"]) > div:last-child > div:first-child {
        height: 56vw !important;
        min-height: 200px !important;
      }
      /* Sub-image heights */
      [data-screen-label]:not([data-screen-label="Intro"]):not([data-screen-label="Footer"]) > div:last-child > div:not(:first-child) {
        height: 36vw !important;
        min-height: 120px !important;
      }
      /* Footer */
      [data-screen-label="Footer"] {
        flex-direction: column !important;
        gap: 12px !important;
        padding: 24px 20px !important;
      }
      /* Lightbox: shrink arrows and pull them closer so image gets max width */
      button[aria-label="Previous image"],
      button[aria-label="Next image"] {
        width: 36px !important;
        height: 36px !important;
        font-size: 16px !important;
      }
      button[aria-label="Previous image"] { left: 10px !important; }
      button[aria-label="Next image"]     { right: 10px !important; }
    }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f7f9fb; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  </style>
  <noscript>
    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ize: 10px; letter-spacing: 0.06em; padding: 4px 9px; border: 1px solid rgba(20, 30, 45, 0.2); border-radius: 99px; color: rgb(90, 100, 114);\">{{ project.status }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ project.link }}\">\n          <a href=\"{{ project.link }}\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"align-self: flex-start; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.04em; text-decoration: none; color: rgb(26, 29, 33); border-bottom: 1px solid rgba(26, 29, 33, 0.45); padding-bottom: 2px; margin-top: 2px;\">view project ↗<\u002Fa>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: {{ project.cols }}; gap: 10px; min-width: 0;\">\n        <div style=\"grid-column: 1 / -1; height: 440px; overflow: hidden; border-radius: 6px;\">\n          <div style=\"width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);\" style-hover=\"transform: scale(1.04);\">\n            <x-import component-from-global-scope=\"image-slot\" id=\"{{ project.slot1 }}\" data-lb=\"main\" shape=\"rounded\" radius=\"6\" fit=\"{{ project.fit }}\" placeholder=\"{{ project.ph1 }}\" hint-size=\"100%,440px\"><\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height: 260px; overflow: hidden; border-radius: 6px;\">\n          <div style=\"width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);\" style-hover=\"transform: scale(1.04);\">\n            <x-import component-from-global-scope=\"image-slot\" id=\"{{ project.slot2 }}\" shape=\"rounded\" radius=\"6\" fit=\"{{ project.fit }}\" placeholder=\"{{ project.ph2 }}\" hint-size=\"100%,260px\"><\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height: 260px; overflow: hidden; border-radius: 6px;\">\n          <div style=\"width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);\" style-hover=\"transform: scale(1.04);\">\n            <x-import component-from-global-scope=\"image-slot\" id=\"{{ project.slot3 }}\" shape=\"rounded\" radius=\"6\" fit=\"{{ project.fit }}\" placeholder=\"{{ project.ph3 }}\" hint-size=\"100%,260px\"><\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <div data-screen-label=\"Footer\" style=\"border-top: 1px solid rgba(20, 30, 45, 0.1); padding: 36px 48px; display: flex; justify-content: space-between; align-items: baseline; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: rgb(138, 147, 160);\">\n    <span>© 2026 tamsin wilson<\u002Fspan>\n    <a href=\"mailto:hello@tamsinwilson.com\" style=\"border-bottom: 1px solid rgb(26, 29, 33); padding-bottom: 2px; text-decoration: none; color: rgb(26,29,33);\">get in touch ↗<\u002Fa>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ hasLightbox }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeLightbox }}\" style=\"position: fixed; inset: 0; background: rgba(16, 20, 26, 0.88); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 48px 80px; cursor: zoom-out; animation: tw-lb-fade 0.25s ease;\"&gt;\n      <sc-if value=\"{{ hasMultiple }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ prevImage }}\" aria-label=\"Previous image\" style=\"position: fixed; left: 32px; top: 50%; transform: translateY(-50%); z-index: 1001; width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.4); background: rgba(16, 20, 26, 0.4); color: rgb(255, 255, 255); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;\" style-hover=\"background: rgba(255, 255, 255, 0.15);\">←<\u002Fbutton>\n      <\u002Fsc-if>\n      <div style=\"width: min(1100px, 100%); height: 100%; display: flex; align-items: center; justify-content: center;\">\n        <img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=\" ref=\"{{ lightboxImgRef }}\" alt=\"\" style=\"width: 100%; height: 100%; object-fit: contain; animation: tw-lb-pop 0.3s cubic-bezier(0.22, 0.61, 0.36, 1); filter: drop-shadow(0 24px 60px rgba(0, 0, 0, 0.45));\">\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasMultiple }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ nextImage }}\" aria-label=\"Next image\" style=\"position: fixed; right: 32px; top: 50%; transform: translateY(-50%); z-index: 1001; width: 48px; height: 48px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.4); background: rgba(16, 20, 26, 0.4); color: rgb(255, 255, 255); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;\" style-hover=\"background: rgba(255, 255, 255, 0.15);\">→<\u002Fbutton>\n        <div style=\"position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: rgba(255, 255, 255, 0.75);\">{{ lightboxCounter }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fpath><\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { gallery: null, galleryIndex: 0, emailCopied: false };\n\n  _step(dir) {\n    this.setState((s) => {\n      if (!s.gallery) return null;\n      const n = s.gallery.length;\n      return { galleryIndex: (s.galleryIndex + dir + n) % n };\n    });\n  }\n\n  componentDidMount() {\n    // Click a filled image slot -> open lightbox. Delayed slightly so a\n    // double-click (reframe mode) can cancel it.\n    this._onClick = (e) => {\n      const path = e.composedPath();\n      // Ignore clicks on slot controls (replace/edit buttons, file inputs, links)\n      if (path.some((n) => n.getAttribute && (n.getAttribute('data-act') || n.tagName === 'BUTTON' || n.tagName === 'INPUT' || n.tagName === 'A'))) return;\n      const slot = path.find((n) => n.tagName === 'IMAGE-SLOT');\n      // Only the large (main) image opens the lightbox gallery\n      if (!slot || slot.getAttribute('data-lb') !== 'main' || !slot.hasAttribute('data-filled') || slot.hasAttribute('data-reframe')) return;\n      // Gather all filled images in this project section, main image first\n      const section = slot.closest('[data-screen-label]');\n      const slots = section ? [...section.querySelectorAll('image-slot')] : [slot];\n      const srcs = slots\n        .filter((s) => s.hasAttribute('data-filled') && s.shadowRoot)\n        .map((s) => { const im = s.shadowRoot.querySelector('.frame img'); return im && im.getAttribute('src'); })\n        .filter(Boolean);\n      if (!srcs.length) return;\n      clearTimeout(this._lbTimer);\n      this._lbTimer = setTimeout(() => this.setState({ gallery: srcs, galleryIndex: 0 }), 220);\n    };\n    this._onDblClick = () => clearTimeout(this._lbTimer);\n    this._onKey = (e) => {\n      if (e.key === 'Escape') this.setState({ gallery: null });\n      if (this.state.gallery) {\n        if (e.key === 'ArrowRight') this._step(1);\n        if (e.key === 'ArrowLeft') this._step(-1);\n      }\n    };\n    document.addEventListener('click', this._onClick);\n    document.addEventListener('dblclick', this._onDblClick);\n    document.addEventListener('keydown', this._onKey);\n  }\n\n  componentDidUpdate() {\n    if (this._lbImg && this.state.gallery) {\n      const src = this.state.gallery[this.state.galleryIndex];\n      if (this._lbImg.getAttribute('src') !== src) this._lbImg.src = src;\n    }\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._lbTimer);\n    document.removeEventListener('click', this._onClick);\n    document.removeEventListener('dblclick', this._onDblClick);\n    document.removeEventListener('keydown', this._onKey);\n  }\n\n  renderVals() {\n    const projects = this.projectData();\n    projects.forEach((p) => { p.cols = p.cols || '1fr 1fr'; });\n    return {\n      projects,\n      hasLightbox: !!this.state.gallery,\n      hasMultiple: !!(this.state.gallery && this.state.gallery.length > 1),\n      lightboxCounter: this.state.gallery ? (this.state.galleryIndex + 1) + ' / ' + this.state.gallery.length : '',\n      lightboxImgRef: (el) => {\n        this._lbImg = el;\n        if (el && this.state.gallery) el.src = this.state.gallery[this.state.galleryIndex];\n      },\n      closeLightbox: () => this.setState({ gallery: null }),\n      emailLabel: this.state.emailCopied ? 'copied to clipboard ✓' : 'email me ↗',\n      copyEmail: (e) => {\n        e.preventDefault();\n        navigator.clipboard.writeText('wilsontamsin@gmail.com').then(() => {\n          this.setState({ emailCopied: true });\n          clearTimeout(this._emailTimer);\n          this._emailTimer = setTimeout(() => this.setState({ emailCopied: false }), 2000);\n        }).catch(() => { window.location.href = 'mailto:wilsontamsin@gmail.com'; });\n      },\n      prevImage: (e) => { e.stopPropagation(); this._step(-1); },\n      nextImage: (e) => { e.stopPropagation(); this._step(1); },\n    };\n  }\n\n  projectData() {\n    return [\n        { index: '01', name: 'Smack PR & Consulting', tags: 'visual identity · logo design · web design', blurb: \"Translated the client's brand vision into a full visual system (logo, color palette, layout) and designed the responsive site to match.\", status: '', slot1: 'tw-smack-1', slot2: 'tw-smack-2', slot3: 'tw-smack-3', ph1: 'smackpr: site hero', ph2: 'logo lockup', ph3: 'layout system', link: 'https://smackpr.com' },\n        { index: '02', name: 'Gia', tags: 'visual identity · logo design · web design', blurb: \"Refining gia's visual identity: wordmark, color palette, and a responsive website, building out a clear tonal direction the client had already defined.\", status: 'IN PROGRESS', slot1: 'tw-via-1', slot2: 'tw-via-2', slot3: 'tw-via-3', ph1: 'gia: wordmark', ph2: 'palette / tone', ph3: 'responsive site' },\n        { index: '03', name: 'Lifebox', tags: 'brand strategy · brand identity · ux/ui design', blurb: \"Built Lifebox's brand and visual identity from the ground up, then carried it through end-to-end mobile app design.\", status: '', fit: 'contain', slot1: 'tw-life-1', slot2: 'tw-life-2', slot3: 'tw-life-3', ph1: 'lifebox: app overview', ph2: 'brand identity', ph3: 'mobile screens', link: 'https://www.tamsinw.com/work/lifebox' },\n        { index: '04', name: 'Wilsen', cols: '0.65fr 1.35fr', tags: 'art direction · brand strategy · merch design', blurb: \"Ongoing art direction for Wilsen's releases (album covers, merch, and campaign visuals), shaping distinct visual worlds with a consistent brand across their catalogue.\", status: 'ONGOING', slot1: 'tw-wil-1', slot2: 'tw-wil-2', slot3: 'tw-wil-3', ph1: 'wilsen: album cover', ph2: 'merch', ph3: 'campaign visuals', link: 'https://www.secretcityrecords.com/pages/wilsen' }\n    ];\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
